name: Demo CI

on:
  push:
  pull_request:

jobs:

  # ---------------------------------------------------------
  # 1) Test bin/init with default settings (port 9501)
  # ---------------------------------------------------------
  test-init:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run bin/init (default settings)
        run: ./bin/init

      - name: Verify Moodle MUC configuration exists (installer ran)
        run: |
          if [ ! -f dataroot/muc/config.php ]; then
            echo "MUC config missing — Moodle installer did not run"
            ls -R dataroot
            exit 1
          fi

      - name: Verify homepage contains correct site name (MuTMS)
        run: |
          for i in {1..10}; do
            HTML=$(curl -s http://127.0.0.1:9501/ || true)
            if echo "$HTML" | grep -qi "MuTMS"; then
              echo "Homepage OK"
              exit 0
            fi
            echo "Waiting for webserver..."
            sleep 2
          done

          echo "Homepage does not contain expected site name 'MuTMS'"
          exit 1

      - name: Stop containers
        run: docker compose down


  # ---------------------------------------------------------
  # 2) Test bin/init-moodle with custom settings (port 9502)
  # ---------------------------------------------------------
  test-init-moodle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run bin/init-moodle with custom settings
        run: ./bin/init-moodle 9502 "CI2" "CI Demo 2"

      - name: Verify Moodle MUC configuration exists (installer ran)
        run: |
          if [ ! -f dataroot/muc/config.php ]; then
            echo "MUC config missing — Moodle installer did not run"
            ls -R dataroot
            exit 1
          fi

      - name: Verify homepage contains correct site name (CI Demo 2)
        run: |
          for i in {1..10}; do
            HTML=$(curl -s http://127.0.0.1:9502/ || true)
            if echo "$HTML" | grep -qi "CI Demo 2"; then
              echo "Homepage OK"
              exit 0
            fi
            echo "Waiting for webserver..."
            sleep 2
          done

          echo "Homepage does not contain expected site name 'CI Demo 2'"
          exit 1

      - name: Stop containers
        run: docker compose down


  # ---------------------------------------------------------
  # 3) Test bin/restore using backup created from bin/init
  # ---------------------------------------------------------
  test-restore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run bin/init (port 9503)
        run: ./bin/init 9503

      - name: Run bin/backup mybackup
        run: ./bin/backup mybackup

      - name: Verify backup file exists
        run: |
          if [ ! -f backups/mybackup.tgz ]; then
            echo "Backup file backups/mybackup.tgz missing"
            ls -R backups
            exit 1
          fi

      - name: Remove dataroot, database, site
        run: sudo rm -rf dataroot database site demo.env

      - name: Run bin/restore mybackup
        run: ./bin/restore mybackup

      - name: Verify Moodle MUC configuration exists after restore
        run: |
          if [ ! -f dataroot/muc/config.php ]; then
            echo "MUC config missing — restore did not recreate Moodle properly"
            ls -R dataroot
            exit 1
          fi

      - name: Verify restored homepage contains correct site name
        run: |
          for i in {1..10}; do
            HTML=$(curl -s http://127.0.0.1:9503/ || true)
            if echo "$HTML" | grep -qi "MuTMS"; then
              echo "Restored homepage OK"
              exit 0
            fi
            echo "Waiting for webserver..."
            sleep 2
          done

          echo "Restored homepage does not contain expected site name 'MuTMS'"
          exit 1

      - name: Stop containers
        run: docker compose down
