services:
  db:
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb_file_per_table=On
      - --wait-timeout=28800
      - --skip-log-bin
    environment:
      MYSQL_DATABASE: moodle
      MYSQL_PASSWORD: m@0dl3ing
      MYSQL_ROOT_PASSWORD: m@0dl3ing
      MYSQL_USER: moodle
    image: mariadb:11.8
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -pm@0dl3ing --silent"]
      interval: 2s
      timeout: 3s
      retries: 20
    networks:
      default: null
    volumes:
      - type: bind
        source: assets/db/mariadb/mdc-wait.sh
        target: /mdc/mdc-wait.sh
        bind:
          create_host_path: true
      - type: bind
        source: database
        target: /var/lib/mysql
        bind:
          create_host_path: true
  webserver:
    depends_on:
      db:
        condition: service_healthy
        required: true
    environment:
      COMPOSER_ALLOW_SUPERUSER: "1"
      DEMO_PORT: ${DEMO_PORT:-9501}
    working_dir: /var/www/site/moodle
    image: mutms/mdc-php-apache:8.3
    networks:
      default: null
    tmpfs:
      - /tmp
    volumes:
      - type: bind
        source: dataroot
        target: /var/www/dataroot
        bind:
          create_host_path: true
      - type: bind
        source: site
        target: /var/www/site
        bind:
          create_host_path: true
      - type: bind
        source: assets/webserver/composer_install.sh
        target: /mdc/composer_install.sh
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: assets/webserver/apache2.conf
        target: /etc/apache2/sites-available/000-default.conf
        read_only: true
        bind:
          create_host_path: true
    ports:
      - "127.0.0.1:${DEMO_PORT:-9501}:80"
